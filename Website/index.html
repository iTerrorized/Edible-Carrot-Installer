<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terrorized VPM Packages</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { text-align: center; max-width: 600px; padding: 2rem; }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        p { color: #8b949e; margin-bottom: 2rem; }
        .btn { display: inline-block; padding: 12px 24px; background: #238636; color: #fff; text-decoration: none; border-radius: 6px; font-weight: 600; transition: background 0.2s; }
        .btn:hover { background: #2ea043; }
        .url-box { margin-top: 2rem; background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 1rem; word-break: break-all; font-family: monospace; font-size: 0.9rem; color: #58a6ff; }
        .label { color: #8b949e; font-size: 0.8rem; margin-bottom: 0.5rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Terrorized VPM Packages</h1>
        <p>Add this listing to VRChat Creator Companion to install packages.</p>
        <a class="btn" href="vcc://vpm/addRepo?url=https://iterrorized.github.io/vpm-packages/index.json">Add to VCC</a>
        <div class="url-box">
            <div class="label">Manual URL:</div>
            https://iterrorized.github.io/vpm-packages/index.json
        </div>
    </div>
</body>
</html>
